<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OBS Coach Widget</title>
    <style>
        :root {
            --animation-duration: 2s;
            --tip-display-duration: 8s;
        }
        html, body {
            background-color: transparent;
            margin: 0;
            padding: 0;
            overflow: hidden;
            font-family: 'Segoe UI', 'Roboto', sans-serif;
            font-weight: 700;
        }
        #widget-container {
            position: absolute;
            bottom: 20px;
            left: 20px;
            width: 400px;
            padding: 15px;
            border-radius: 10px;
            box-shadow: 0 0 0px 0px rgba(0, 0, 0, 0);
            transition: box-shadow 0.5s ease-in-out;
        }
        #tip-text {
            color: white;
            font-size: 20px;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.8);
            opacity: 0;
            transform: translateY(10px);
            transition: opacity 0.5s ease-out, transform 0.5s ease-out;
        }
        #tip-text.visible {
            opacity: 1;
            transform: translateY(0);
        }
        @keyframes border-glow {
            0% { box-shadow: 0 0 10px 0px rgba(0, 255, 255, 0); }
            50% { box-shadow: 0 0 25px 8px rgba(0, 255, 255, 0.7); }
            100% { box-shadow: 0 0 10px 0px rgba(0, 255, 255, 0); }
        }
        .aries-glow #widget-container {
            animation: border-glow var(--animation-duration) 1 ease-in-out;
        }
    </style>
</head>
<body>

    <div id="widget-container">
        <div id="tip-text"></div>
    </div>

    <script>
        const wsUri = "ws://localhost:8080";
        let tipTimeout;

        function connect() {
            const websocket = new WebSocket(wsUri);

            websocket.onopen = (evt) => console.log("Widget Conectado al Servidor WebSocket.");
            websocket.onclose = (evt) => {
                console.log("Widget Desconectado. Reintentando en 3 segundos...");
                setTimeout(() => connect(), 3000);
            };
            websocket.onmessage = (evt) => {
                try {
                    const message = JSON.parse(evt.data);
                    if (message.event === 'update' && message.payload) {
                        handleUpdate(message.payload);
                    }
                } catch (e) {
                    console.error("Error al parsear el mensaje JSON:", e);
                }
            };
            websocket.onerror = (evt) => {
                console.error("Error de WebSocket:", evt);
                websocket.close();
            };
        }

        function handleUpdate(payload) {
            const { type } = payload;
            const body = document.body;
            
            if (type === 'TIP' && payload.content) {
                const tipElement = document.getElementById('tip-text');
                if (tipTimeout) clearTimeout(tipTimeout);
                tipElement.textContent = payload.content;
                tipElement.classList.add('visible');
                tipTimeout = setTimeout(() => {
                    tipElement.classList.remove('visible');
                }, parseFloat(getComputedStyle(document.documentElement).getPropertyValue('--tip-display-duration')) * 1000 || 8000);
            }

            if (type === 'ANIMATION' && payload.name) {
                const animationClass = payload.name;
                const onAnimationEnd = () => {
                    body.classList.remove(animationClass);
                    body.removeEventListener('animationend', onAnimationEnd);
                };
                body.addEventListener('animationend', onAnimationEnd);
                body.classList.add(animationClass);
            }
        }
        document.addEventListener("DOMContentLoaded", connect);
    </script>
</body>
</html>
